    <style>
        body {

            background-color: #050505; /* Deepest black for contrast */

        /* Enhanced Animated Background Orbs - Tennis Theme */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            animation: float 15s infinite alternate ease-in-out;
            z-index: -1;
        }
        .orb-1 {

            top: -10%;

        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: #15803d; /* Deep Court Green */
            bottom: -15%;
            right: -20%;
            animation-delay: -7s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.1); }
            100% { transform: translate(-30px, 90px) scale(0.95); }
        }

        /* Ultra-Premium 3D Glass Card */
        .premium-glass {
            background: linear-gradient(145deg, rgba(20, 25, 20, 0.8) 0%, rgba(5, 10, 5, 0.9) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(163, 230, 53, 0.2);
            border-left: 1px solid rgba(163, 230, 53, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.9),
                        inset 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* Rotating Energy Border around Logo - Tennis Lime/Green */
        .spin-border {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0 280deg, #4ade80 320deg, #a3e635 360deg);
            animation: spin 2.5s linear infinite;
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Rich Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #ffffff, #e5e7eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .text-neon-green {
            background: linear-gradient(to right, #a3e635, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Premium Button Glow - Green Theme */
        @keyframes subtle-pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 25px 0px rgba(34, 197, 94, 0.4), inset 0 1px 1px rgba(255,255,255,0.4); 
                transform: scale(1); 
            }
            50% { 
                box-shadow: 0 0 45px 5px rgba(163, 230, 53, 0.5), inset 0 1px 1px rgba(255,255,255,0.5); 
                transform: scale(1.02); 
            }
        }
        .btn-attention {
            animation: subtle-pulse-glow 3s infinite;
        }

        /* VIP Banner Pulse - Gold/Premium Theme */
        @keyframes vip-pulse {
            0%, 100% { opacity: 0.95; box-shadow: 0 0 15px rgba(234, 179, 8, 0.15); }
            50% { opacity: 1; box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); border-color: rgba(234, 179, 8, 0.4); }
        }
        .vip-banner {
            animation: vip-pulse 2.5s infinite;
        }

        /* Entrance Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        btn.addEventListener('click', (e) => {

            isClicked = true;

            btnText.innerText = 'JOINING...';
            btnText.classList.add('animate-pulse');
            btnIcon.style.display = 'none';
